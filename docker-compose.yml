version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: wai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: wai

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wai-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      MONGO_URL: mongodb://mongodb:27017/wai
      JWT_SECRET: local-dev-jwt-secret-change-in-prod
      ENABLE_API_DOCS: "1"
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wai-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8080

volumes:
  mongo_data:
