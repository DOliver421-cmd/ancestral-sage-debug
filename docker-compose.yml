version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: wai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wai-backend
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - backend/.env
    environment:
      - MONGO_URL=mongodb://mongo:27017/wai_localtest
      - DB_NAME=wai_localtest
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
      - PUBLIC_APP_URL=http://localhost:3000
      - SERVE_FRONTEND=0
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend
      - ./src:/app/src

  frontend:
    image: node:20-slim
    container_name: wai-frontend
    working_dir: /app/frontend
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env.development.local
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8080
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "npm install && npm start"

volumes:
  mongo_data:
  frontend_node_modules:
