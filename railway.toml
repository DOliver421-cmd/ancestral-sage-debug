# Live deployment entrypoint for the full app (backend + SPA).
# Use this root railway.toml for production releases.
[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/version"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "/bin/sh -c \"exec uvicorn server:app --host 0.0.0.0 --port ${PORT:-8080}\""
