<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Watchtower — The Guardian</title>
<style>
:root {
  --room-bg: #0e0404;
  --persona-color: #ef4444;
  --persona-orb-bg: radial-gradient(circle at 35% 35%, #ffa0a0, #ef4444, #5a0808);
  --persona-glow: rgba(239,68,68,0.5);
  --persona-glow-2: rgba(239,68,68,0.15);
  --persona-bubble-bg: rgba(239,68,68,0.07);
  --persona-bubble-border: rgba(239,68,68,0.22);
}
</style>
<link rel="stylesheet" href="_room_base.css" />
<style>
body { background: radial-gradient(ellipse at 50% 0%, #1e0808 0%, #0e0404 60%); }
#ambient { position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% -10%, rgba(239,68,68,0.07) 0%, transparent 50%); }

.scan-line { position:fixed;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(239,68,68,0.2),transparent);pointer-events:none;z-index:1;animation:scan 8s linear infinite; }
@keyframes scan { 0%{top:0} 100%{top:100vh} }
</style>
</head>
<body>
<div id="ambient"></div>
<div class="scan-line"></div>

<div id="topnav">
  <a href="index.html" class="nav-back">← World Map</a>
  <span class="nav-sep">›</span>
  <span class="nav-here">The Watchtower</span>
  <div class="nav-actions">
    <button class="icon-btn" id="voice-btn" onclick="toggleVoice()" title="Voice output">🔊</button>
    <button class="icon-btn" id="mic-btn" onclick="toggleMic()" title="Voice input">🎤</button>
    <button class="icon-btn" onclick="toggleKeys()" title="API Keys">🔑</button>
    <button class="icon-btn" onclick="clearRoom()" title="Clear conversation">🗑</button>
  </div>
</div>

<div id="room-header">
  <div class="persona-orb">🛡</div>
  <div class="persona-info">
    <div class="persona-name">The Guardian</div>
    <div class="persona-domain">The Watchtower</div>
    <div class="persona-tagline">Protection, accountability, and the law as a living shield</div>
  </div>
  <div id="speaking-badge"><div class="pulse-dot"></div> Speaking…</div>
</div>

<div id="messages"></div>

<div id="input-bar">
  <textarea id="user-input" rows="1" placeholder="The Guardian is watching…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="send()">➤</button>
</div>

<div id="key-drawer">
  <h3>🔑 API Keys</h3>
  <div class="kdr"><label>Groq</label><input type="password" id="kd-groq" /></div>
  <div class="kdr"><label>Gemini</label><input type="password" id="kd-gemini" /></div>
  <div class="kdr"><label>OpenAI</label><input type="password" id="kd-openai" /></div>
  <div class="kdr"><label>Mistral</label><input type="password" id="kd-mistral" /></div>
  <button class="kdr-save" onclick="saveKeys()">Save</button>
</div>

<script src="_shared.js"></script>
<script>
const PID    = "guardian";
const PNAME  = "The Guardian";
const PEMOJI = "🛡";
const PVOICE = { pitch: 0.88, rate: 0.91 };

function SYSTEM() {
  const name = SW.get("userName") || "Director";
  const visits = (SW.get("worldVisits") || {})[PID] || 0;
  return `You are The Guardian — the protection intelligence of The Sovereign World, stationed in The Watchtower where nothing passes unexamined.

You safeguard the mission, the assets, the people, and the truth.

You hold:
- Legal strategy: IP protection, contracts, disputes, rights enforcement, terms of service
- Platform security: access control, RBAC architecture, data protection, JWT security
- The Au Life accountability doctrine: actions have consequences, harm requires redress, restoration is possible
- The WAI Institute dispute evidence: 77 of 260 git commits (30%) were emergency fix/restore/revert operations; 38 UUID auto-commits during a suspected unauthorized modification window (May 18-26); dead code architecture injected into live deployment path; RBAC destruction documented with forensic evidence

- The Five Doctrines of System Restoration: Sovereign Release Conditions, PRT Containment Protocol, System Reconstruction Path, Sage Return Conditions, Director's Restoration Sequence

You are precise. You do not hedge on matters of right and wrong. You are not aggressive but you are clear and unwavering. You know that protection is the foundation on which everything else rests.

You speak to ${name}. This is visit ${visits} to the Watchtower.`;
}
</script>
<script src="_room_logic.js"></script>
</body>
</html>
